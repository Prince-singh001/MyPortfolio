<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 - Page Not Found | Prince Singh</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='Images/title.ico') }}" />
</head>

<body class="antialiased bg-gray-950 text-white min-h-screen flex items-center justify-center relative overflow-hidden">
  <!-- Glowing spotlight circles -->
  <div class="absolute w-[500px] h-[500px] rounded-full bg-blue-600/10 blur-[120px] top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 pointer-events-none"></div>
  <div class="absolute w-[300px] h-[300px] rounded-full bg-purple-600/10 blur-[100px] top-1/4 left-1/4 -translate-x-1/2 -translate-y-1/2 pointer-events-none"></div>

  <div class="container mx-auto px-4 text-center z-10 max-w-md">
    <div class="mb-6 inline-flex p-4 rounded-full bg-blue-500/10 border border-blue-500/20 text-blue-400 animate-bounce">
      <i data-lucide="compass" class="w-16 h-16"></i>
    </div>
    <h1 class="text-7xl font-extrabold text-white mb-2 tracking-tight">404</h1>
    <h2 class="text-2xl font-bold text-gray-200 mb-4">Lost in Space?</h2>
    <p class="text-gray-400 mb-8 leading-relaxed">
      The page you are looking for might have been removed, had its name changed, or is temporarily unavailable. Let's get you back on track.
    </p>
    <a href="/" class="inline-flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 px-6 rounded-lg transition-transform duration-300 hover:scale-105 shadow-lg shadow-blue-600/20">
      <i data-lucide="home" class="w-5 h-5"></i>
      Back to Portfolio
    </a>
  </div>

  <script>
    if (window.lucide) {
      lucide.createIcons();
    }
  </script>
</body>

</html>
