<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>500 - Server Error | Prince Singh</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='Images/title.ico') }}" />
</head>

<body class="antialiased bg-gray-950 text-white min-h-screen flex items-center justify-center relative overflow-hidden">
  <!-- Glowing spotlight circles -->
  <div class="absolute w-[500px] h-[500px] rounded-full bg-red-600/10 blur-[120px] top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 pointer-events-none"></div>
  <div class="absolute w-[300px] h-[300px] rounded-full bg-orange-600/10 blur-[100px] top-1/4 left-1/4 -translate-x-1/2 -translate-y-1/2 pointer-events-none"></div>

  <div class="container mx-auto px-4 text-center z-10 max-w-md">
    <div class="mb-6 inline-flex p-4 rounded-full bg-red-500/10 border border-red-500/20 text-red-400 animate-pulse">
      <i data-lucide="alert-triangle" class="w-16 h-16"></i>
    </div>
    <h1 class="text-7xl font-extrabold text-white mb-2 tracking-tight">500</h1>
    <h2 class="text-2xl font-bold text-gray-200 mb-4">Internal Server Error</h2>
    <p class="text-gray-400 mb-8 leading-relaxed">
      Oops! Something went wrong on our end. We're looking into it. Please try reloading the page or check back later.
    </p>
    <div class="flex gap-4 justify-center">
      <button onclick="window.location.reload()" class="inline-flex items-center justify-center gap-2 bg-gray-800 hover:bg-gray-700 text-white font-medium py-3 px-6 rounded-lg transition-transform duration-300 hover:scale-105 border border-gray-700">
        <i data-lucide="refresh-cw" class="w-5 h-5"></i>
        Retry
      </button>
      <a href="/" class="inline-flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 px-6 rounded-lg transition-transform duration-300 hover:scale-105 shadow-lg shadow-blue-600/20">
        <i data-lucide="home" class="w-5 h-5"></i>
        Portfolio Home
      </a>
    </div>
  </div>

  <script>
    if (window.lucide) {
      lucide.createIcons();
    }
  </script>
</body>

</html>
